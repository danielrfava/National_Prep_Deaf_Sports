<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>National Prep Deaf Sports - Research</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="public-page">
    <header data-public-nav></header>

    <main class="container public-main">
      <section class="filters" aria-label="Filters">
        <div class="filter-grid">
          <div class="filter-field">
            <label for="athleteFilter">Search</label>
            <input id="athleteFilter" type="search" placeholder="Search athlete name" autocomplete="off" />
          </div>

          <div class="filter-field">
            <label for="divisionFilter">Division</label>
            <select id="divisionFilter">
              <option value="">All</option>
              <option value="d1">Division 1</option>
              <option value="d2">Division 2</option>
            </select>
          </div>

          <div class="filter-field">
            <label for="schoolFilter">School</label>
            <select id="schoolFilter">
              <option value="">All schools</option>
            </select>
          </div>

          <div class="filter-field">
            <label for="sportFilter">Sport</label>
            <select id="sportFilter">
              <option value="">All sports</option>
            </select>
          </div>

          <div class="filter-field">
            <label for="seasonFilter">Season</label>
            <select id="seasonFilter">
              <option value="">All seasons</option>
            </select>
          </div>

          <div class="filter-field" id="footballFormatFilterField" style="display: none;">
            <label for="footballFormatFilter">Football Format</label>
            <select id="footballFormatFilter">
              <option value="">All Football Formats</option>
            </select>
          </div>

          <div class="filter-field">
            <label for="statsViewFilter">Stats View</label>
            <select id="statsViewFilter">
              <option value="season">Season</option>
              <option value="career-standard">Career (4-Year Standard)</option>
              <option value="career-extended">Career (Extended Eligibility)</option>
            </select>
          </div>
        </div>

        <div class="filter-actions">
          <button id="applyFiltersBtn" type="button" class="apply-filters-btn">Explore Records</button>
        </div>

        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section>
        <h2>Player Statistics</h2>
        <div id="records"></div>
      </section>
    </main>

    <script src="./env.js"></script>
    <script type="module" src="./supabaseClient.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
