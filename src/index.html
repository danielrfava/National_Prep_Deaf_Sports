<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>National Prep Deaf Sports</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
<body class="landing-page landing-shell">
    <div class="video-background">
      <video autoplay muted loop playsinline id="bgVideo">
        <source src="./assets/videos/video_1.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
      <div class="video-overlay video-overlay-strong"></div>
    </div>

    <header id="homeTopbar" class="topbar landing-topbar">
      <div class="topbar-container">
        <a class="brand" href="index.html" aria-label="National Prep Deaf Sports home">
          <div class="logo">NP</div>
          <div class="brand-text">
            <div class="brand-title">National Prep Deaf Sports</div>
            <div class="brand-tag">Deaf High School Athletics</div>
          </div>
        </a>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link nav-link-active" href="index.html">Search</a>
          <a class="nav-link" href="schools.html">Schools</a>
          <a class="nav-link" href="stats.html">Research</a>
          <a class="nav-link" href="about.html">About</a>
        </nav>

        <div class="search-auth-group">
          <a href="portal/login.html" class="login-btn" title="Athletic Director / Admin Login">
            <span class="login-icon">👤</span>
            <span class="login-text">Log In</span>
          </a>
        </div>
      </div>
    </header>

    <main class="landing-content landing-content-home">
      <div class="landing-center landing-center-home">
        <div class="landing-logo intro-only" id="introLogo">
          <div class="logo-circle">NP</div>
        </div>

        <h1 class="landing-title" id="homeTitle">National Prep Deaf Sports</h1>

        <p class="landing-tagline intro-only" id="introTagline">
          Celebrating Deaf High School Athletics<br />
          From Past to Present
        </p>

        <section id="searchHero" class="search-hero">
          <h2 class="home-headline">The home for Deaf school athletics</h2>
          <p class="home-subheadline">
            Preserving records, history, and recognition for Deaf athletes and schools
          </p>

          <form class="home-search-form" action="stats.html" method="get">
            <label class="sr-only" for="homeSearch">Search athletes, schools, records, and history</label>
            <input
              id="homeSearch"
              name="q"
              type="search"
              class="home-search-input"
              placeholder="Search athletes, schools, records, and history"
              autocomplete="off"
            />
            <button class="home-search-btn" type="submit">Search</button>
          </form>
        </section>
      </div>
    </main>

    <script type="module">
      const video = document.getElementById("bgVideo");
      const body = document.body;

      window.addEventListener("load", () => {
        if (video) {
          video.style.opacity = "1";
        }

        setTimeout(() => {
          body.classList.add("show-home");
        }, 1800);
      });

      document.addEventListener("visibilitychange", () => {
        if (!video) return;
        if (document.hidden) video.pause();
        else video.play();
      });
    </script>
  </body>
</html>
