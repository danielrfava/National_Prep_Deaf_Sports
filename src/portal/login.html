<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NPDS - Log In</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="public-page portal-auth-page">
    <header data-public-nav class="topbar public-topbar">
      <div class="topbar-container">
        <a class="brand" href="../index.html" aria-label="National Prep Deaf Sports home">
          <div class="logo">NP</div>
          <div class="brand-text">
            <div class="brand-title">National Prep Deaf Sports</div>
            <div class="brand-tag">Deaf High School Athletics</div>
          </div>
        </a>

        <nav class="nav public-nav" aria-label="Primary">
          <a class="nav-link" href="../search.html">Search</a>
          <a class="nav-link" href="../schools.html">Schools</a>
          <a class="nav-link" href="../stats.html">Research</a>
          <a class="nav-link" href="../about.html">About</a>
          <a class="nav-link nav-link-active" href="login.html" aria-current="page">Log In</a>
        </nav>
      </div>
    </header>

    <main class="portal-auth-main">
      <section class="portal-login-card">
        <p class="public-kicker">Athletic Director Portal</p>
        <h1 class="portal-login-title">Athletic Director Log In</h1>
        <p class="portal-login-subline">Submit stats and manage your school's records.</p>

        <div id="alert" class="portal-alert" hidden></div>

        <form id="loginForm" class="portal-login-form" novalidate>
          <label class="portal-label" for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            placeholder="your.email@school.edu"
          />

          <label class="portal-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="Enter password"
          />

          <button type="submit" class="portal-login-btn" id="loginBtn">Sign In</button>
        </form>

        <div class="portal-login-links">
          <a href="../index.html">Back to Public Site</a>
          <a href="mailto:danielrfava@gmail.com?subject=NPDS%20Portal%20Access%20Request">Need an account? Request Access</a>
        </div>
      </section>
    </main>

    <script src="../env.js"></script>
    <script type="module">
      import { supabase } from "../supabaseClient.js";
      import { mountPublicTopNav } from "../components/publicTopNav.js";

      mountPublicTopNav({ active: "login", basePath: "../" });

      const form = document.getElementById("loginForm");
      const loginBtn = document.getElementById("loginBtn");
      const alertDiv = document.getElementById("alert");

      function showAlert(message, type = "error") {
        if (!alertDiv) return;
        alertDiv.textContent = message;
        alertDiv.className = `portal-alert portal-alert-${type}`;
        alertDiv.hidden = false;
      }

      function hideAlert() {
        if (!alertDiv) return;
        alertDiv.hidden = true;
      }

      async function routeByRole(userId) {
        const { data: profile, error: profileError } = await supabase
          .from("user_profiles")
          .select("role")
          .eq("id", userId)
          .single();

        if (profileError) throw profileError;

        if (profile?.role === "athletic_director") {
          window.location.href = "dashboard.html";
          return;
        }

        if (profile?.role === "admin") {
          window.location.href = "../admin/admin-dashboard.html";
          return;
        }

        throw new Error("You do not have access to this portal.");
      }

      form?.addEventListener("submit", async (event) => {
        event.preventDefault();
        hideAlert();

        const email = document.getElementById("email")?.value || "";
        const password = document.getElementById("password")?.value || "";

        loginBtn.textContent = "Signing in...";
        loginBtn.disabled = true;

        try {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;

          await routeByRole(data.user.id);
        } catch (error) {
          console.error("Login error:", error);
          showAlert(error.message || "Login failed. Please check your credentials.");
          loginBtn.textContent = "Sign In";
          loginBtn.disabled = false;
        }
      });

      supabase.auth.getSession().then(async ({ data: { session } }) => {
        if (!session?.user?.id) {
          return;
        }

        try {
          await routeByRole(session.user.id);
        } catch (_error) {
          // stay on login if role lookup fails
        }
      });
    </script>
  </body>
</html>
