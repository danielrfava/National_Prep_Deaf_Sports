<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>National Prep Deaf Sports</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="landing-page landing-shell show-home">
    <div class="video-background">
      <video autoplay muted loop playsinline id="bgVideo">
        <source src="./assets/videos/video_1.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
      <div class="video-overlay video-overlay-strong"></div>
    </div>

    <header data-public-nav class="topbar public-topbar landing-topbar">
      <div class="topbar-container">
        <a class="brand" href="index.html" aria-label="National Prep Deaf Sports home">
          <div class="logo">NP</div>
          <div class="brand-text">
            <div class="brand-title">National Prep Deaf Sports</div>
            <div class="brand-tag">Deaf High School Athletics</div>
          </div>
        </a>

        <nav class="nav public-nav" aria-label="Primary">
          <a class="nav-link nav-link-active" data-nav-key="search" href="search.html" aria-current="page">Search</a>
          <a class="nav-link" data-nav-key="schools" href="schools.html">Schools</a>
          <a class="nav-link" data-nav-key="research" href="stats.html">Research</a>
          <a class="nav-link" data-nav-key="about" href="about.html">About</a>
          <a class="nav-link" data-nav-key="login" href="portal/login.html">Log In</a>
        </nav>
      </div>
    </header>

    <main class="landing-content landing-content-home">
      <div class="landing-center landing-center-home">
        <section id="searchHero" class="search-hero">
          <h1 class="home-headline">The Home for Deaf Sports Records</h1>
          <p class="home-subheadline">
            Search athletes, schools, seasons, and records across generations of Deaf sports.
          </p>

          <form class="home-search-form" action="search.html" method="get">
            <label class="sr-only" for="homeSearch">Search athletes, schools, records, and history</label>
            <input
              id="homeSearch"
              name="q"
              type="search"
              class="home-search-input"
              placeholder="Search athletes, schools, records, and history"
              autocomplete="off"
            />
            <button class="home-search-btn" type="submit">Search</button>
          </form>
        </section>
      </div>
    </main>

    <footer data-public-footer></footer>

    <script type="module">
      import { mountPublicTopNav } from "./components/publicTopNav.js";
      import { attachSearchAutocomplete } from "./components/searchAutocomplete.js";
      import { buildAthleteProfileHref } from "./services/publicEntityService.js";

      mountPublicTopNav({ active: "search", landing: true });

      const video = document.getElementById("bgVideo");
      const body = document.body;
      const searchInput = document.getElementById("homeSearch");
      const searchForm = document.querySelector(".home-search-form");
      const searchNavLink = document.querySelector('[data-nav-key="search"]');
      const searchHero = document.getElementById("searchHero");
      let searchActivated = false;

      function activateSearchState() {
        if (searchActivated) {
          return;
        }

        searchActivated = true;
        body.classList.add("show-home", "search-active");

        if (video) {
          video.classList.add("video-fade-out");
          video.pause();
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        body.classList.add("show-home");

        if (video) {
          video.addEventListener(
            "error",
            () => {
              body.classList.add("video-unavailable");
            },
            { once: true }
          );
          video.addEventListener(
            "stalled",
            () => {
              body.classList.add("video-unavailable");
            },
            { once: true }
          );
          video.style.opacity = "1";
          const playPromise = video.play();
          if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(() => {
              body.classList.add("video-unavailable");
            });
          }
        }
      });

      document.addEventListener("visibilitychange", () => {
        if (!video) return;

        if (document.hidden) {
          video.pause();
          return;
        }

        if (!searchActivated) {
          const playPromise = video.play();
          if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(() => {
              body.classList.add("video-unavailable");
            });
          }
        }
      });

      if (searchNavLink) {
        searchNavLink.addEventListener("click", (event) => {
          event.preventDefault();
          activateSearchState();
          searchHero?.scrollIntoView({ behavior: "smooth", block: "center" });
          searchInput?.focus({ preventScroll: true });
        });
      }

      if (searchInput) {
        searchInput.addEventListener("focus", activateSearchState);
        searchInput.addEventListener("input", activateSearchState);
      }

      if (searchForm) {
        searchForm.addEventListener("submit", () => {
          activateSearchState();
        });
      }

      attachSearchAutocomplete(searchInput, {
        onSelect(result) {
          activateSearchState();

          if (result.type === "athlete") {
            window.location.href = buildAthleteProfileHref(result);
            return;
          }

          if (result.type === "school") {
            if (result.schoolId) {
              window.location.href = `stats.html?school=${encodeURIComponent(result.schoolId)}`;
              return;
            }

            const schoolQuery = result.title || result.query || "";
            window.location.href = `stats.html${schoolQuery ? `?q=${encodeURIComponent(schoolQuery)}` : ""}`;
            return;
          }

          window.location.href = `search.html?q=${encodeURIComponent(result.query || result.title || "")}`;
        },
      });
    </script>
  </body>
</html>
